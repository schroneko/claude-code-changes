name: Track Claude Code Changes

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Specific Claude Code version to fetch"
        required: false
        type: string
  repository_dispatch:
    types: [npm_release]

permissions:
  contents: write

jobs:
  track:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Track release
        run: |
          VERSION_INPUT="${{ github.event.inputs.version || github.event.client_payload.version || '' }}"
          if [ -n "$VERSION_INPUT" ]; then
            npm run track -- "$VERSION_INPUT"
          else
            npm run track
          fi

      - name: Detect Artifacts
        id: artifacts
        run: |
          report_file="$(git status --porcelain reports | awk '{print $2}' | grep '\.md$' | tail -n 1 || true)"
          snapshot_dir="$(git status --porcelain snapshots | awk '{print $2}' | cut -d/ -f1-2 | tail -n 1 || true)"
          echo "report_file=$report_file" >> "$GITHUB_OUTPUT"
          echo "snapshot_dir=$snapshot_dir" >> "$GITHUB_OUTPUT"

      - name: Publish Report Summary
        run: |
          report_file="${{ steps.artifacts.outputs.report_file }}"
          if [ -n "$report_file" ] && [ -f "$report_file" ]; then
            {
              echo "# Claude Code Changes"
              echo
              echo "Latest generated report: \`$report_file\`"
              echo
              cat "$report_file"
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          snapshot_dir="${{ steps.artifacts.outputs.snapshot_dir }}"
          {
            echo "# Claude Code Changes"
            echo
            if [ -n "$snapshot_dir" ]; then
              echo "Saved snapshot only: \`$snapshot_dir\`"
            else
              echo "No report or snapshot changes detected."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Notify Discord
        if: ${{ (steps.artifacts.outputs.report_file != '' || steps.artifacts.outputs.snapshot_dir != '') }}
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          REPORT_FILE: ${{ steps.artifacts.outputs.report_file }}
          SNAPSHOT_DIR: ${{ steps.artifacts.outputs.snapshot_dir }}
          REPOSITORY: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import urllib.request

          if not os.environ.get("DISCORD_WEBHOOK_URL"):
            raise SystemExit(0)

          report_file = os.environ.get("REPORT_FILE", "")
          snapshot_dir = os.environ.get("SNAPSHOT_DIR", "")
          repo = os.environ["REPOSITORY"]
          run_url = os.environ["RUN_URL"]

          if report_file and os.path.exists(report_file):
            version = os.path.basename(report_file).replace(".md", "")
            content = "\n".join([
              f"Claude Code change tracked for `{repo}`",
              f"Report: `{version}`",
              "",
              run_url,
            ])
          else:
            content = "\n".join([
              f"Claude Code snapshot updated for `{repo}`",
              f"Snapshot: `{snapshot_dir}`" if snapshot_dir else "Snapshot saved",
              "",
              run_url,
            ])

          payload = json.dumps({"content": content[:1900]}).encode("utf-8")
          req = urllib.request.Request(
            os.environ["DISCORD_WEBHOOK_URL"],
            data=payload,
            headers={"Content-Type": "application/json", "User-Agent": "claude-code-changes"},
            method="POST",
          )
          with urllib.request.urlopen(req) as resp:
            if resp.status >= 300:
              raise RuntimeError(f"Discord webhook failed: {resp.status}")
          PY

      - name: Commit changes
        run: |
          git add reports snapshots CURRENT.md
          git diff --staged --quiet && exit 0
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "Track Claude Code changes"
          git push
