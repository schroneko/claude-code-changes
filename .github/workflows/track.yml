name: Track Claude Code Changes

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Specific Claude Code version to fetch"
        required: false
        type: string
  repository_dispatch:
    types: [npm_release]

permissions:
  contents: write

jobs:
  track:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Track release
        run: |
          VERSION_INPUT="${{ github.event.inputs.version || github.event.client_payload.version || '' }}"
          if [ -n "$VERSION_INPUT" ]; then
            npm run track -- "$VERSION_INPUT"
          else
            npm run track
          fi

      - name: Detect Artifacts
        id: artifacts
        run: |
          report_file="$(git status --porcelain reports | awk '{print $2}' | grep '\.md$' | tail -n 1 || true)"
          report_json="$(git status --porcelain reports | awk '{print $2}' | grep '\.json$' | tail -n 1 || true)"
          snapshot_dir="$(git status --porcelain snapshots | awk '{print $2}' | cut -d/ -f1-2 | tail -n 1 || true)"
          echo "report_file=$report_file" >> "$GITHUB_OUTPUT"
          echo "report_json=$report_json" >> "$GITHUB_OUTPUT"
          echo "snapshot_dir=$snapshot_dir" >> "$GITHUB_OUTPUT"

      - name: Publish Report Summary
        run: |
          report_file="${{ steps.artifacts.outputs.report_file }}"
          if [ -n "$report_file" ] && [ -f "$report_file" ]; then
            {
              echo "# Claude Code Changes"
              echo
              echo "Latest generated report: \`$report_file\`"
              echo
              cat "$report_file"
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          snapshot_dir="${{ steps.artifacts.outputs.snapshot_dir }}"
          {
            echo "# Claude Code Changes"
            echo
            if [ -n "$snapshot_dir" ]; then
              echo "Saved snapshot only: \`$snapshot_dir\`"
            else
              echo "No report or snapshot changes detected."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Notify Discord
        if: ${{ (steps.artifacts.outputs.report_json != '' || steps.artifacts.outputs.snapshot_dir != '') }}
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          REPORT_JSON: ${{ steps.artifacts.outputs.report_json }}
          SNAPSHOT_DIR: ${{ steps.artifacts.outputs.snapshot_dir }}
          REPOSITORY: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import urllib.request

          if not os.environ.get("DISCORD_WEBHOOK_URL"):
            raise SystemExit(0)

          report_json = os.environ.get("REPORT_JSON", "")
          snapshot_dir = os.environ.get("SNAPSHOT_DIR", "")
          repo = os.environ["REPOSITORY"]
          run_url = os.environ["RUN_URL"]

          if report_json and os.path.exists(report_json):
            with open(report_json, "r", encoding="utf-8") as f:
              report = json.load(f)

            slash_changes = report.get("slashCommands", [])
            slash_lines = []
            for entry in slash_changes[:10]:
              detail = f" ({entry['detail']})" if entry.get("detail") else ""
              slash_lines.append(f"- {entry['type']}: {entry['name']}{detail}")

            source_only = report.get("sourceOnlyChanges", {})
            source_only_count = sum(len(source_only.get(key, [])) for key in [
              "packageFiles", "slashCommands", "envVars", "settings", "tools"
            ])

            content_lines = [
              f"Claude Code change tracked for `{repo}`",
              f"Version: `{report['prevVersion']} -> {report['version']}`",
              f"Source-only items: `{source_only_count}`",
            ]

            if slash_lines:
              content_lines.append("")
              content_lines.append("Slash command changes:")
              content_lines.extend(slash_lines)

            content_lines.append("")
            content_lines.append(run_url)
            content = "\n".join(content_lines)
          else:
            content = "\n".join([
              f"Claude Code snapshot updated for `{repo}`",
              f"Snapshot: `{snapshot_dir}`" if snapshot_dir else "Snapshot saved",
              "",
              run_url,
            ])

          payload = json.dumps({"content": content[:1900]}).encode("utf-8")
          req = urllib.request.Request(
            os.environ["DISCORD_WEBHOOK_URL"],
            data=payload,
            headers={"Content-Type": "application/json"},
            method="POST",
          )
          with urllib.request.urlopen(req) as resp:
            if resp.status >= 300:
              raise RuntimeError(f"Discord webhook failed: {resp.status}")
          PY

      - name: Commit changes
        run: |
          git add reports snapshots
          git diff --staged --quiet && exit 0
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "Track Claude Code changes"
          git push
