name: Track Claude Code Changes

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
    inputs:
      version:
        description: "Specific Claude Code version to fetch"
        required: false
        type: string

permissions:
  contents: write

jobs:
  track:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Track release
        run: npm run track -- ${{ inputs.version }}

      - name: Commit changes
        run: |
          git add reports snapshots
          git diff --staged --quiet && exit 0
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "Track Claude Code changes"
          git push
